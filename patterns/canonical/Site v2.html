<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>HALO FastHub — site v2 (composed from blocks)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #FFFFFF; }
  body { font-family: "Montserrat", system-ui, -apple-system, sans-serif; color: #1A1A1A; min-width: 1440px; }
  * { box-sizing: border-box; }
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; }
  section { scroll-margin-top: 120px; }
  /* page switcher */
  #switcher { position: sticky; top: 0; z-index: 200; background: #1A1A1A; color: #fff; display: flex; align-items: center; gap: 4px; padding: 10px 20px; flex-wrap: wrap; }
  #switcher .lab { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-right: 12px; }
  #switcher button { font-family: "Montserrat"; font-size: 12px; padding: 7px 13px; background: transparent; color: rgba(255,255,255,0.7); border: 1px solid transparent; border-radius: 999px; cursor: pointer; }
  #switcher button.on { background: #fff; color: #1A1A1A; font-weight: 600; }
  #pageroot { }
</style>
</head>
<body>
<div id="switcher"></div>
<div id="pageroot"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="components/logo.jsx"></script>
<script type="text/babel" src="components/pattern.jsx"></script>
<script type="text/babel" src="components/brand-assets.jsx"></script>
<script type="text/babel" src="components/component-system.jsx"></script>
<script type="text/babel" src="components/component-system-extra.jsx"></script>
<script type="text/babel" src="components/component-system-polestar.jsx"></script>
<script type="text/babel" src="components/landing-page-base.jsx"></script>
<script type="text/babel" src="components/landing-page-1.jsx"></script>
<script type="text/babel" src="components/landing-page-2.jsx"></script>
<script type="text/babel" src="components/landing-page-3.jsx"></script>
<script type="text/babel" src="components/new-blocks.jsx"></script>
<script type="text/babel" src="components/page-blocks.jsx"></script>
<script type="text/babel" src="components/home-blocks.jsx"></script>
<script type="text/babel" src="components/library-blocks.jsx"></script>
<script type="text/babel" src="components/blocks.jsx"></script>
<script type="text/babel" src="components/site-pages.jsx"></script>

<script type="text/babel">
const pageRoot = ReactDOM.createRoot(document.getElementById("pageroot"));
const swRoot = ReactDOM.createRoot(document.getElementById("switcher"));

function current() {
  return new URLSearchParams(location.search).get("page") || "home";
}
function go(slug) {
  const u = new URL(location.href);
  u.searchParams.set("page", slug);
  history.replaceState({}, "", u);
  render();
}
function Switcher() {
  const cur = current();
  return (
    <React.Fragment>
      <span className="lab">Site v2 · built from the 20 blocks</span>
      {SITE_ORDER.map((slug) => (
        <button key={slug} className={cur === slug ? "on" : ""} onClick={() => go(slug)}>{SITEMAP[slug].title}</button>
      ))}
    </React.Fragment>
  );
}
function render() {
  swRoot.render(<Switcher />);
  pageRoot.render(<SitePageV2 slug={current()} />);
  window.scrollTo(0, 0);
}
render();
</script>
</body>
</html>
